name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      api_changed: ${{ steps.changes.outputs.api_changed }}
      api_version: ${{ steps.changes.outputs.api_version }}
      web_changed: ${{ steps.changes.outputs.web_changed }}
      web_version: ${{ steps.changes.outputs.web_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: changesets/action@v1
        id: changesets
        with:
          version: bun run changeset:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect version changes
        if: steps.changesets.outputs.hasChangesets == 'false'
        id: changes
        run: |
          api_version=$(jq -r .version apps/api/package.json)
          web_version=$(jq -r .version apps/web/package.json)

          if git diff HEAD~1 -- apps/api/package.json | grep -q '"version"'; then
            echo "api_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "api_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if git diff HEAD~1 -- apps/web/package.json | grep -q '"version"'; then
            echo "web_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "web_changed=false" >> "$GITHUB_OUTPUT"
          fi

          echo "api_version=$api_version" >> "$GITHUB_OUTPUT"
          echo "web_version=$web_version" >> "$GITHUB_OUTPUT"

  # Only runs if api version has changed
  build-api:
    name: Build / kixvault-api
    needs: release
    if: needs.release.outputs.api_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kixvault-api
          tags: |
            type=raw,value=${{ needs.release.outputs.api_version }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_RELEASE=${{ needs.release.outputs.api_version }}

  # Only runs if web version has changed
  build-web:
    name: Build / kixvault-web
    needs: release
    if: needs.release.outputs.web_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kixvault-web
          tags: |
            type=raw,value=${{ needs.release.outputs.web_version }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            VITE_APP_VERSION=${{ needs.release.outputs.web_version }}
