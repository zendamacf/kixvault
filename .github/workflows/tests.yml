name: Tests

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-tests

jobs:
  test:
    name: Test / ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: packages/shared
            flag: shared
          - package: packages/db
            flag: db
          - package: apps/api
            flag: api
          - package: apps/web
            flag: web
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: kixvault
          POSTGRES_PASSWORD: kixvault
          POSTGRES_DB: kixvault
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kixvault -d kixvault"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://kixvault:kixvault@localhost:5432/kixvault
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test with coverage
        run: bun run --cwd ${{ matrix.package }} test:coverage

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ matrix.package }}/coverage/lcov.info
          flags: ${{ matrix.flag }}
          name: ${{ matrix.flag }}
          disable_search: true
          handle_no_reports_found: true
          fail_ci_if_error: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.flag }}
          path: ${{ matrix.package }}/coverage/lcov.info
          if-no-files-found: ignore

  coverage-report:
    name: Coverage report
    needs: test
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage
          merge-multiple: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Generate coverage summary
        id: summary
        run: |
          MARKDOWN="$(bun .github/scripts/summarize-coverage.ts coverage)"
          {
            echo 'markdown<<EOF'
            echo "$MARKDOWN"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post coverage comment
        if: steps.summary.outputs.markdown != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          message: ${{ steps.summary.outputs.markdown }}
