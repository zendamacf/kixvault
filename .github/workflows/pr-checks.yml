name: PR Checks

on:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: PR Check / ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - apps/api
          - apps/web
          - packages/db
          - packages/shared
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run --cwd ${{ matrix.package }} lint

      - name: Typecheck
        run: bun run --cwd ${{ matrix.package }} typecheck
