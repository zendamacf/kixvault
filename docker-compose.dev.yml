services:
  db:
    image: postgres:18-alpine
    container_name: kixvault-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: kixvault
      POSTGRES_PASSWORD: kixvault
      POSTGRES_DB: kixvault
    volumes:
      - kixvault_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kixvault -d kixvault"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  kixvault_pgdata:
